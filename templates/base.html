<!DOCTYPE html>
<html>
<head>
    <title>{{ titulo }}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        header {
            background: #1e293b;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            width: 80%;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        button {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        input {
            padding: 6px;
            margin-top: 5px;
            margin-bottom: 10px;
            width: 100%;
        }

        img {
            border-radius: 6px;
            margin-top: 10px;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header>Teste</header>

    <div class="container">
        {% block conteudo %}
        {% endblock %}
    </div>

</body>
</html>
