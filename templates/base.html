<!DOCTYPE html>
<html>
<head>
    <title>{{ titulo if titulo else "Teste" }}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        header {
            background: #1e293b;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .container {
            width: 90%;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        button {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        input {
            width: 100%;
            padding: 6px;
            margin-bottom: 10px;
        }

        /* 🔥 GRID RESPONSIVO */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        /* 🔥 CARD ESTILO INSTAGRAM */
        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card p {
            margin: 10px;
            font-size: 14px;
            word-break: break-word;
        }

        .paginacao {
            margin-top: 20px;
            text-align: center;
        }

        a {
            text-decoration: none;
        }

        /* 🔥 MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            padding-top: 50px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
        }

        .modal img {
            display: block;
            margin: auto;
            max-width: 90%;
            max-height: 80%;
            border-radius: 10px;
        }

        .modal span {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 35px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>Teste</header>

<div class="container">
    {% block conteudo %}{% endblock %}
</div>

</body>
</html>
