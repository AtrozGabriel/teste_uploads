<!DOCTYPE html>
<html>
<head>
    <title>{{ titulo if titulo else "Teste" }}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        header {
            background: #1e293b;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .container {
            width: 80%;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        button {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        input {
            width: 100%;
            padding: 6px;
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .card {
            background: #f9fafb;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            height: 260px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
}
        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .paginacao {
            margin-top: 20px;
            text-align: center;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>

<header>Teste</header>

<div class="container">
    {% block conteudo %}{% endblock %}
</div>

</body>
</html>
